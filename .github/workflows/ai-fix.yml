name: AI Fix Issue

on:
  issues:
    types: [labeled]

jobs:
  ai-fix:
    if: >
      github.event.label.name == 'ai-fix' &&
      github.event.issue.author_association != 'NONE'
    uses: ao-org/.github/.github/workflows/ai-fix-reusable.yml@master
    permissions:
      contents: write
      pull-requests: write
      issues: write
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
