name: AI Fix Issue

on:
  issues:
    types: [labeled]

jobs:
  ai-fix:
    if: >
      github.event.label.name == 'ai-fix' &&
      github.event.issue.author_association != 'NONE'
    uses: ao-org/argentum-online-assets/.github/workflows/ai-fix-reusable.yml@main
    secrets:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
